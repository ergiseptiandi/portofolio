version: '3'
services:
  portfolio:
    container_name: portofolio-portfolio-1
    build: .
    networks:
      - nginx-proxy-manager_default
    env_file:
      - /home/runner/portfolio.env
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 100M

networks:
  nginx-proxy-manager_default:
    external: true
